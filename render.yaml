services:
  - type: web
    name: fit-coach-ai-backend
    env: python
    plan: free
    rootDir: ai_backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: CHAT_RESPONSE_MODE
        value: dataset_only
      - key: CORS_ORIGINS
        value: "*"
      - key: VITE_SUPABASE_URL
        value: https://mrwanyfaojtslkalbazf.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yd2FueWZhb2p0c2xrYWxiYXpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTUyNDAsImV4cCI6MjA4OTA5MTI0MH0.xJSaq4_0VA3ELUg8pXyXbrUQzpeAkeYSQbdIWNjw6xU

  - type: web
    name: fit-coach-ai-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_AI_BACKEND_URL
        value: https://fit-coach-ai-backend.onrender.com
